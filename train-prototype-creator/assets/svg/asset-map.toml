# User-owned asset map for train-prototype-creator.
# 后续请直接在这个文件里补充、修改映射；除非你明确要求，代理默认只读不改。
# 当前火车票 5 个一级页面与公共资源的标准 page 标识：
# home=火车首页, list=火车列表页, middle=火车中间页, fill=火车填写页, occupy=火车占座页, shared=公共图标资源
# 约定：不带 page 前缀的 SVG 文件默认视为 shared 公共资源。

version = 1
asset_root = "./assets/svg"
prefer_user_svg = true
copy_to_output = true
output_subdir = "wireframes/assets"
fallback_order = ["user-svg", "figma-export", "manual-css"]
locked_missing_behavior = "ask-user"
user_owns_mapping = true

# shared 公共资源

[[mapping]]
key = "shared.chevron.small"
page = "shared"
component = "shared"
location = "chevron-small"
selector_hint = "通用小号箭头"
figma_node = ""
source = "./assets/svg/arrow-small.svg"
output_name = "shared-arrow-small.svg"
lock = "free"
required = false
priority = 30
notes = "不带 page 前缀，默认可跨页面复用。"

[[mapping]]
key = "shared.amount-details.arrow-downward"
page = "shared"
component = "amount-details"
